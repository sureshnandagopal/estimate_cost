<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Miso Kidswear Estimate</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#667eea,#764ba2);
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
margin-bottom:15px;
}

h2{
text-align:center;
color:#333;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:8px;
background:#ff7a18;
color:white;
font-size:16px;
font-weight:bold;
}

button:hover{
background:#ff5722;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#764ba2;
color:white;
padding:8px;
}

td{
padding:8px;
text-align:center;
border-bottom:1px solid #ddd;
}

.delete{
background:#ff4d4d;
color:white;
border:none;
padding:5px 8px;
border-radius:5px;
}

.summary{
text-align:center;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Miso Kidswear Estimate</h2>

<input id="product" placeholder="Product name">

<input id="price" type="number" placeholder="price">

<input id="qty" type="number" placeholder="Quantity">

<input id="discount" type="number" placeholder="Discount % (global)">

<button onclick="addItem()">Add Product</button>

</div>

<div class="card">

<table id="table">
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th></th>
</tr>
</table>

</div>

<div class="card summary">

Total Pieces: <span id="pieces">0</span><br>
Grand Total ₹ <span id="grand">0</span>

</div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [];

function save(){
localStorage.setItem("items",JSON.stringify(items));
}

function render(){

let table=document.getElementById("table");
table.innerHTML=`
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th></th>
</tr>
`;

let grand=0;
let pieces=0;

items.forEach((item,index)=>{

let discount=document.getElementById("discount").value || 0;

let price=item.price-(item.price*discount/100);

let total=price*item.qty;

grand+=total;
pieces+=item.qty;

let row=table.insertRow();

row.insertCell(0).innerText=item.product;
row.insertCell(1).innerText=item.price;
row.insertCell(2).innerText=item.qty;
row.insertCell(3).innerText=Math.round(total);

let del=row.insertCell(4);

let btn=document.createElement("button");
btn.innerText="X";
btn.className="delete";

btn.onclick=function(){
items.splice(index,1);
save();
render();
}

del.appendChild(btn);

});

document.getElementById("grand").innerText=Math.round(grand);
document.getElementById("pieces").innerText=pieces;

}

function addItem(){

let product=document.getElementById("product").value;
let price=parseFloat(document.getElementById("price").value);
let qty=parseInt(document.getElementById("qty").value);

if(!product||!price||!qty) return;

items.push({product,price,qty});

save();

render();

document.getElementById("product").value="";
document.getElementById("price").value="";
document.getElementById("qty").value="";

}

render();

</script>

</body>
</html>
