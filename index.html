<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Miso Kidswear Estimate</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
padding:20px;
color:#333;
}

.container{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#444;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#ff6b6b;
color:white;
border:none;
border-radius:6px;
font-size:16px;
margin-top:5px;
}

button:hover{
background:#ff5252;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
font-size:14px;
}

th{
background:#2575fc;
color:white;
padding:8px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

.delete-btn{
background:#ff3b3b;
padding:5px 10px;
border:none;
color:white;
border-radius:4px;
}

.total-box{
margin-top:15px;
background:#f3f3f3;
padding:10px;
border-radius:8px;
text-align:center;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Miso Kidswear Estimate</h2>

<input id="product" placeholder="Product name">

<input id="price" type="number" placeholder="price">

<input id="qty" type="number" placeholder="Quantity">

<input id="discount" type="number" placeholder="Discount % (applies to all items)">

<button onclick="addItem()">Add Product</button>

<table id="table">
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Discount</th>
<th>Total</th>
<th>Delete</th>
</tr>
</table>

<div class="total-box">
Grand Total ₹ <span id="grand">0</span>
</div>

</div>

<script>

let grandTotal=0;

function addItem(){

let product=document.getElementById("product").value;
let price=parseFloat(document.getElementById("price").value);
let qty=parseInt(document.getElementById("qty").value);
let discount=parseFloat(document.getElementById("discount").value)||0;

if(!product||!price||!qty) return;

let discountedPrice=price-(price*discount/100);

let total=discountedPrice*qty;

grandTotal+=total;

let table=document.getElementById("table");

let row=table.insertRow();

row.insertCell(0).innerText=product;
row.insertCell(1).innerText=price;
row.insertCell(2).innerText=qty;
row.insertCell(3).innerText=discount+"%";
row.insertCell(4).innerText=Math.round(total);

let delCell=row.insertCell(5);

let btn=document.createElement("button");
btn.innerText="X";
btn.className="delete-btn";

btn.onclick=function(){

grandTotal-=total;

document.getElementById("grand").innerText=Math.round(grandTotal);

row.remove();

}

delCell.appendChild(btn);

document.getElementById("grand").innerText=Math.round(grandTotal);

document.getElementById("product").value="";
document.getElementById("price").value="";
document.getElementById("qty").value="";
}

</script>

</body>
</html>
