<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Miso Kidswear Estimate</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#667eea,#764ba2);
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
margin-bottom:20px;
}

.logo{
display:block;
margin:auto;
width:200px;
margin-bottom:10px;
}

h2{
text-align:center;
margin-top:5px;
color:#333;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
background:#ff7a18;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff5c00;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#764ba2;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

.delete{
background:#ff4d4d;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.summary{
text-align:center;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<img src="logo.png" class="logo">

<h2>Estimate Tool</h2>

<input id="product" placeholder="Product name">

<input id="price" type="number" placeholder="Price">

<input id="qty" type="number" placeholder="Quantity">

<input id="discount" type="number" placeholder="Discount % (global)">

<button onclick="addItem()">Add Product</button>

</div>

<div class="card">

<table id="table">
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th></th>
</tr>
</table>

</div>

<div class="card summary">

Total Pieces: <span id="pieces">0</span><br>
Grand Total ₹ <span id="grand">0</span>

</div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [];

function save(){
localStorage.setItem("items",JSON.stringify(items));
}

function render(){

let table=document.getElementById("table");

table.innerHTML=`
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th></th>
</tr>
`;

let grand=0;
let pieces=0;

let discount=document.getElementById("discount").value || 0;

items.forEach((item,index)=>{

let price=item.price-(item.price*discount/100);

let total=price*item.qty;

grand+=total;
pieces+=item.qty;

let row=table.insertRow();

row.insertCell(0).innerText=item.product;
row.insertCell(1).innerText=item.price;
row.insertCell(2).innerText=item.qty;
row.insertCell(3).innerText=Math.round(total);

let del=row.insertCell(4);

let btn=document.createElement("button");
btn.innerText="X";
btn.className="delete";

btn.onclick=function(){

items.splice(index,1);

save();

render();

}

del.appendChild(btn);

});

document.getElementById("grand").innerText=Math.round(grand);
document.getElementById("pieces").innerText=pieces;

}

function addItem(){

let product=document.getElementById("product").value;
let price=parseFloat(document.getElementById("price").value);
let qty=parseInt(document.getElementById("qty").value);

if(!product || !price || !qty) return;

items.push({product,price,qty});

save();

render();

document.getElementById("product").value="";
document.getElementById("price").value="";
document.getElementById("qty").value="";

}

render();

</script>

</body>
</html>
